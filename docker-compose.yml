version: "3.8"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - fastapi
    restart: unless-stopped

  fastapi:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  celery-worker:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build: .
    env_file: .env
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app beat --loglevel=info

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    env_file: .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
